name: Autonomous Blog Automation

on:
  schedule:
    # Run every Wednesday and Friday at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * 3,5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Generate SEO Article
        run: node scripts/generate-blog.js
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "robot: generate new SEO blog post"
          branch: main
          file_pattern: "src/content/blog/*.md"
